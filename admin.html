<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — JiabyShop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Jost:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--ng:#FFD700;--gg:#00FF88;--rr:#FF3366;--bb:#00CFFF;--oo:#FF8C00;--dark:#08080f;--d2:#0f0f1a;--d3:#161625;--card:#12121e;--brd:rgba(255,215,0,.15)}
body{font-family:'Jost',sans-serif;background:var(--dark);color:#eee;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,215,0,.04),transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,255,136,.03),transparent 50%);pointer-events:none;z-index:0}
.gate-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1}
.gate{background:var(--card);border:1px solid var(--brd);border-radius:24px;padding:40px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 0 60px rgba(255,215,0,.08)}
.gate-logo{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--ng);text-shadow:0 0 20px rgba(255,215,0,.6);letter-spacing:.1em;margin-bottom:4px}
.gate-sub{font-size:.72rem;color:rgba(255,215,0,.5);letter-spacing:.2em;text-transform:uppercase;margin-bottom:28px}
.gate input{width:100%;padding:14px 18px;background:var(--d3);border:1.5px solid var(--brd);border-radius:12px;color:#fff;font-family:'Jost',sans-serif;font-size:.92rem;outline:none;text-align:center;letter-spacing:.12em;margin-bottom:14px;transition:all .3s}
.gate input:focus{border-color:var(--ng);box-shadow:0 0 20px rgba(255,215,0,.1)}
.gate-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B8860B,#FFD700,#B8860B);background-size:200%;border:none;border-radius:12px;color:#000;font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;animation:shim 3s linear infinite}
@keyframes shim{0%{background-position:0%}100%{background-position:200%}}
.gate-btn:hover{box-shadow:0 0 30px rgba(255,215,0,.4)}
.gate-err{color:var(--rr);font-size:.78rem;margin-top:10px;min-height:18px;text-shadow:0 0 10px rgba(255,51,102,.5)}
.adm-hdr{background:rgba(8,8,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;color:var(--ng);text-shadow:0 0 15px rgba(255,215,0,.5);letter-spacing:.08em}
.hdr-badge{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--ng);font-size:.58rem;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.1em;text-transform:uppercase}
.rfr-btn{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:var(--ng);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:.75rem;font-weight:600;font-family:'Jost',sans-serif;transition:all .2s}
.rfr-btn:hover{background:rgba(255,215,0,.15);box-shadow:0 0 15px rgba(255,215,0,.2)}
.container{max-width:900px;margin:0 auto;padding:22px 16px;position:relative;z-index:1}
.stabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px}
.stab{padding:13px 8px;background:var(--card);border:1px solid var(--brd);border-radius:15px;cursor:pointer;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.45);text-align:center;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:5px}
.stab svg{opacity:.35;transition:opacity .25s}
.stab.active{border-color:var(--ng);color:var(--ng);background:rgba(255,215,0,.06);box-shadow:0 0 20px rgba(255,215,0,.1)}
.stab.active svg{opacity:1;filter:drop-shadow(0 0 5px rgba(255,215,0,.8))}
.srch-wrap{position:relative;margin-bottom:18px}
.srch-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ng);filter:drop-shadow(0 0 4px rgba(255,215,0,.6))}
.srch-inp{width:100%;padding:13px 16px 13px 46px;background:var(--card);border:1.5px solid var(--brd);border-radius:40px;color:#fff;font-family:'Jost',sans-serif;font-size:.88rem;outline:none;transition:all .3s}
.srch-inp:focus{border-color:var(--ng);box-shadow:0 0 20px rgba(255,215,0,.08)}
.srch-inp::placeholder{color:rgba(255,255,255,.2)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stats2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--brd);border-radius:15px;padding:15px 10px;text-align:center}
.stat-n{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;line-height:1}
.stat-l{font-size:.6rem;color:rgba(255,255,255,.3);margin-top:6px;text-transform:uppercase;letter-spacing:.08em}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:7px 13px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:transparent;cursor:pointer;font-size:.73rem;font-weight:600;font-family:'Jost',sans-serif;color:rgba(255,255,255,.45);transition:all .2s}
.fbtn.active{border-color:var(--ng);color:var(--ng);background:rgba(255,215,0,.08);box-shadow:0 0 12px rgba(255,215,0,.12)}
.card{background:var(--card);border:1px solid var(--brd);border-radius:17px;padding:18px;margin-bottom:11px;position:relative;overflow:hidden;transition:border-color .3s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.card.pending::before{background:linear-gradient(180deg,#F59E0B,#B45309);box-shadow:0 0 10px rgba(245,158,11,.5)}
.card.approved::before{background:linear-gradient(180deg,var(--gg),#059669);box-shadow:0 0 10px rgba(0,255,136,.4)}
.card.rejected::before{background:linear-gradient(180deg,var(--rr),#DC2626);box-shadow:0 0 10px rgba(255,51,102,.4)}
.card.blocked::before{background:linear-gradient(180deg,var(--oo),#B45309);box-shadow:0 0 10px rgba(255,140,0,.4)}
.card:hover{border-color:rgba(255,215,0,.25)}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;gap:10px}
.card-ttl{font-family:'Orbitron',monospace;font-weight:700;font-size:.85rem;color:#fff}
.card-dt{font-size:.67rem;color:rgba(255,255,255,.28);margin-top:4px}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;border:1px solid}
.badge.pending{background:rgba(245,158,11,.12);color:#F59E0B;border-color:rgba(245,158,11,.3)}
.badge.approved{background:rgba(0,255,136,.08);color:var(--gg);border-color:rgba(0,255,136,.25)}
.badge.rejected{background:rgba(255,51,102,.08);color:var(--rr);border-color:rgba(255,51,102,.22)}
.badge.blocked{background:rgba(255,140,0,.08);color:var(--oo);border-color:rgba(255,140,0,.22)}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:11px 0}
.ic{background:var(--d3);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:9px 11px}
.il{font-size:.6rem;color:rgba(255,215,0,.45);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.iv{font-size:.8rem;color:#ddd;font-weight:600;word-break:break-all}
.cdesc{font-size:.78rem;color:rgba(255,255,255,.45);line-height:1.6;margin:9px 0;background:var(--d3);border-radius:9px;padding:9px 11px;border:1px solid rgba(255,255,255,.05)}
.cinrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:11px 0}
.cinlbl{font-size:.6rem;color:rgba(255,215,0,.45);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.cinimg{width:100%;height:115px;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,.07);cursor:zoom-in;transition:opacity .2s}
.cinimg:hover{opacity:.82}
.cinempty{width:100%;height:115px;background:var(--d3);border-radius:9px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.18);font-size:.72rem;border:1px dashed rgba(255,255,255,.09)}
.acts{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.btn-a{flex:1;min-width:90px;padding:9px 10px;border-radius:9px;font-weight:700;cursor:pointer;font-size:.74rem;font-family:'Jost',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid}
.b-ok{background:rgba(0,255,136,.1);color:var(--gg);border-color:rgba(0,255,136,.28)}.b-ok:hover{background:rgba(0,255,136,.18);box-shadow:0 0 18px rgba(0,255,136,.18)}
.b-ko{background:rgba(255,51,102,.08);color:var(--rr);border-color:rgba(255,51,102,.22)}.b-ko:hover{background:rgba(255,51,102,.16)}
.b-bl{background:rgba(255,140,0,.08);color:var(--oo);border-color:rgba(255,140,0,.22)}.b-bl:hover{background:rgba(255,140,0,.16)}
.b-ub{background:rgba(0,207,255,.08);color:var(--bb);border-color:rgba(0,207,255,.22)}.b-ub:hover{background:rgba(0,207,255,.16)}
.b-del{background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);border-color:rgba(255,255,255,.09)}.b-del:hover{background:rgba(255,51,102,.08);color:var(--rr);border-color:rgba(255,51,102,.22)}
.note{margin-top:9px;border-radius:9px;padding:9px 12px;font-size:.73rem;line-height:1.5;border:1px solid}
.note.ok{background:rgba(0,255,136,.06);color:rgba(0,255,136,.8);border-color:rgba(0,255,136,.18)}
.note.ko{background:rgba(255,51,102,.06);color:rgba(255,51,102,.8);border-color:rgba(255,51,102,.18)}
.note.bl{background:rgba(255,140,0,.06);color:rgba(255,140,0,.8);border-color:rgba(255,140,0,.18)}
.ucard{background:var(--card);border:1px solid var(--brd);border-radius:13px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:13px;transition:border-color .2s}
.ucard:hover{border-color:rgba(255,215,0,.28)}
.uav{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#B8860B,#FFD700);display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:1rem;flex-shrink:0;overflow:hidden;font-family:'Orbitron',monospace;box-shadow:0 0 12px rgba(255,215,0,.18)}
.uav img{width:100%;height:100%;object-fit:cover}
.uinfo{flex:1;min-width:0}
.uname{font-weight:700;color:#eee;font-size:.86rem}
.uemail{font-size:.7rem;color:rgba(255,255,255,.32);margin-top:2px;word-break:break-all}
.udate{font-size:.63rem;color:rgba(255,255,255,.18);margin-top:2px}
.ubadge{font-size:.6rem;font-weight:700;padding:4px 9px;border-radius:9px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;border:1px solid}
.ubadge.has{background:rgba(0,255,136,.07);color:var(--gg);border-color:rgba(0,255,136,.22)}
.ubadge.no{background:rgba(255,255,255,.03);color:rgba(255,255,255,.25);border-color:rgba(255,255,255,.07)}
.empty{text-align:center;padding:55px 20px;color:rgba(255,255,255,.18);font-size:.86rem}
.empty-ic{font-size:2.2rem;margin-bottom:10px;filter:grayscale(1) opacity(.3)}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(4px)}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:88vh;border-radius:13px;box-shadow:0 0 60px rgba(255,215,0,.12)}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.igrid{grid-template-columns:1fr}.stab{font-size:.65rem;padding:10px 5px}}
</style></head><body>
<div id="gate" class="gate-wrap">
  <div class="gate">
    <div class="gate-logo">JIABYSHOP</div>
    <div class="gate-sub">Administration Panel</div>
    <input type="password" id="sinp" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')checkGate()">
    <button class="gate-btn" onclick="checkGate()">ACCÉDER</button>
    <div class="gate-err" id="gerr"></div>
  </div>
</div>
<div id="panel" style="display:none">
  <div class="adm-hdr">
    <div class="hdr-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="filter:drop-shadow(0 0 6px rgba(255,215,0,.8))"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#FFD700"/></svg>
      <div class="hdr-logo">ADMIN</div>
      <span class="hdr-badge">JiabyShop</span>

      <span id="ts" style="font-size:.68rem;color:rgba(255,255,255,.25)"></span>
      <button class="rfr-btn" onclick="refreshAll()">↺ Actualiser</button>
    </div>
  </div>
  <div class="container">
    <div class="stabs">
      <button class="stab active" id="stab-demandes" onclick="switchSec('demandes',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l1-6h16l1 6"/><path d="M3 9a2 2 0 004 0 2 2 0 004 0 2 2 0 004 0 2 2 0 004 0"/><path d="M5 9v12h14V9"/></svg>
        Demandes
      </button>
      <button class="stab" id="stab-boutiques" onclick="switchSec('boutiques',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Boutiques
      </button>
      <button class="stab" id="stab-comptes" onclick="switchSec('comptes',this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Comptes
      </button>
    </div>
    <div class="srch-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="srch-inp" id="srch" type="text" placeholder="Rechercher..." oninput="handleSearch(this.value)">
    </div>
    <div id="sec-demandes">
      <div class="stats">
        <div class="stat"><div class="stat-n" id="s0" style="color:var(--ng);text-shadow:0 0 15px rgba(255,215,0,.4)">0</div><div class="stat-l">Total</div></div>
        <div class="stat"><div class="stat-n" id="s1" style="color:#F59E0B;text-shadow:0 0 12px rgba(245,158,11,.4)">0</div><div class="stat-l">En attente</div></div>
        <div class="stat"><div class="stat-n" id="s2" style="color:var(--gg);text-shadow:0 0 12px rgba(0,255,136,.3)">0</div><div class="stat-l">Approuvées</div></div>
        <div class="stat"><div class="stat-n" id="s3" style="color:var(--rr);text-shadow:0 0 12px rgba(255,51,102,.3)">0</div><div class="stat-l">Rejetées</div></div>
      </div>
      <div class="filters">
        <button class="fbtn active" onclick="filt('all',this)">Toutes</button>
        <button class="fbtn" onclick="filt('pending',this)">⏳ En attente</button>
        <button class="fbtn" onclick="filt('approved',this)">✅ Approuvées</button>
        <button class="fbtn" onclick="filt('rejected',this)">❌ Rejetées</button>
        <button class="fbtn" onclick="filt('blocked',this)">🚫 Bloquées</button>
      </div>
      <div id="req-list"><div class="empty"><div class="empty-ic">⏳</div>Chargement...</div></div>
    </div>
    <div id="sec-boutiques" style="display:none">
      <div class="stats3">
        <div class="stat"><div class="stat-n" id="sb0" style="color:var(--gg);text-shadow:0 0 12px rgba(0,255,136,.3)">0</div><div class="stat-l">Actives</div></div>
        <div class="stat"><div class="stat-n" id="sb1" style="color:var(--oo);text-shadow:0 0 12px rgba(255,140,0,.3)">0</div><div class="stat-l">Bloquées</div></div>
        <div class="stat"><div class="stat-n" id="sb2" style="color:var(--ng);text-shadow:0 0 12px rgba(255,215,0,.3)">0</div><div class="stat-l">Total</div></div>
      </div>
      <div id="bout-list"><div class="empty"><div class="empty-ic">🏪</div>Chargement...</div></div>
    </div>
    <div id="sec-comptes" style="display:none">
      <div class="stats2">
        <div class="stat"><div class="stat-n" id="sc0" style="color:var(--ng);text-shadow:0 0 12px rgba(255,215,0,.3)">0</div><div class="stat-l">Total comptes</div></div>
        <div class="stat"><div class="stat-n" id="sc1" style="color:var(--gg);text-shadow:0 0 12px rgba(0,255,136,.3)">0</div><div class="stat-l">Ont une boutique</div></div>
      </div>
      <div id="users-list"><div class="empty"><div class="empty-ic">👥</div>Chargement...</div></div>
    </div>
  </div>
</div>

<script>const firebaseConfig = {
  apiKey: "AIzaSyBIgfZKdpkYaJ2Vd0olgxTqFDiWuA4jmyQ",
  authDomain: "jiabyshop.firebaseapp.com",
  projectId: "jiabyshop",
  storageBucket: "jiabyshop.firebasestorage.app",
  messagingSenderId: "263859368911",
  appId: "1:263859368911:web:50d576c4a9fa5e0a2998ba"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();
</script>
<script>
var SECRET='jiabyshop_admin_2025';
var all=[],allBout=[],allUsers=[];
var curFilt='all',curSec='demandes';
var usersLoaded=false,boutLoaded=false;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function checkGate(){
  if(document.getElementById('sinp').value===SECRET){
    document.getElementById('gate').style.display='none';
    document.getElementById('panel').style.display='block';
    loadRequests();
  }else{document.getElementById('gerr').textContent='❌ Clé incorrecte';document.getElementById('sinp').value='';}
}
function refreshAll(){
  if(curSec==='demandes')loadRequests();
  else if(curSec==='boutiques'){boutLoaded=false;loadBoutiques();}
  else{usersLoaded=false;loadUsers();}
}
async function loadRequests(){
  document.getElementById('req-list').innerHTML='<div class="empty"><div class="empty-ic">⏳</div>Chargement...</div>';
  try{
    var snap=await db.collection('boutique_requests').orderBy('createdAt','desc').get();
    all=[];snap.forEach(function(d){all.push(Object.assign({id:d.id},d.data()));});
    updateStats();renderList();
    document.getElementById('ts').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){document.getElementById('req-list').innerHTML='<div class="empty">Erreur: '+esc(e.message)+'</div>';}
}
function updateStats(){
  document.getElementById('s0').textContent=all.length;
  document.getElementById('s1').textContent=all.filter(function(r){return r.status==='pending';}).length;
  document.getElementById('s2').textContent=all.filter(function(r){return r.status==='approved';}).length;
  document.getElementById('s3').textContent=all.filter(function(r){return r.status==='rejected';}).length;
}
function filt(f,btn){curFilt=f;document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderList();}
function renderList(){
  var f=curFilt==='all'?all:all.filter(function(r){return r.status===curFilt;});
  var el=document.getElementById('req-list');
  if(!f.length){el.innerHTML='<div class="empty"><div class="empty-ic">📭</div>Aucune demande</div>';return;}
  el.innerHTML=f.map(cardHtml).join('');
}
var cats={mode:'Mode',beaute:'Beauté',electronique:'Électronique',maison:'Maison',alimentation:'Alimentation',sport:'Sport',bijoux:'Bijoux',autre:'Autre'};
function cardHtml(r){
  var dt=r.createdAt?new Date(r.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'--';
  var bl={pending:'En attente',approved:'Approvee',rejected:'Rejetee',blocked:'Bloquee'}[r.status]||r.status;
  var cR=r.cinRecto?'<img class="cinimg" src="'+esc(r.cinRecto)+'" onclick="openLb(this.src)">':'<div class="cinempty">--</div>';
  var cV=r.cinVerso?'<img class="cinimg" src="'+esc(r.cinVerso)+'" onclick="openLb(this.src)">':'<div class="cinempty">--</div>';
  var uid=esc(r.uid||r.id);
  var acts='';
  if(r.status==='pending'){
    acts='<div class="acts">'+
      '<button class="btn-a b-ok" data-id="'+r.id+'" data-uid="'+uid+'" data-act="approve">OK Valider</button>'+
      '<button class="btn-a b-ko" data-id="'+r.id+'" data-act="reject">Rejeter</button>'+
    '</div>';
  }else if(r.status==='approved'){
    acts='<div class="note ok">Approuvee le '+(r.approvedAt?new Date(r.approvedAt).toLocaleDateString('fr-FR'):'--')+'</div>'+
    '<div class="acts">'+
      '<button class="btn-a b-bl" data-id="'+r.id+'" data-uid="'+uid+'" data-act="block">Bloquer</button>'+
      '<button class="btn-a b-del" data-id="'+r.id+'" data-uid="'+uid+'" data-act="delete">Supprimer</button>'+
    '</div>';
  }else if(r.status==='blocked'){
    acts='<div class="note bl">Bloquee'+(r.adminNote?' -- '+esc(r.adminNote):'')+'</div>'+
    '<div class="acts">'+
      '<button class="btn-a b-ub" data-id="'+r.id+'" data-uid="'+uid+'" data-act="unblock">Debloquer</button>'+
      '<button class="btn-a b-del" data-id="'+r.id+'" data-uid="'+uid+'" data-act="delete">Supprimer</button>'+
    '</div>';
  }else{
    acts='<div class="note ko">Rejetee'+(r.adminNote?' -- '+esc(r.adminNote):'')+'</div>'+
    '<div class="acts"><button class="btn-a b-del" data-id="'+r.id+'" data-uid="'+uid+'" data-act="delete">Supprimer</button></div>';
  }
  return '<div class="card '+(r.status||'pending')+'">'+
    '<div class="card-hdr"><div><div class="card-ttl">'+esc(r.boutiqueName||'Sans nom')+'</div><div class="card-dt">'+dt+'</div></div>'+
    '<span class="badge '+esc(r.status)+'">'+bl+'</span></div>'+
    '<div class="igrid">'+
    '<div class="ic"><div class="il">Proprietaire</div><div class="iv">'+esc(r.userName||'--')+'</div></div>'+
    '<div class="ic"><div class="il">Email</div><div class="iv">'+esc(r.userEmail||'--')+'</div></div>'+
    '<div class="ic"><div class="il">Categorie</div><div class="iv">'+(cats[r.boutiqueCategory]||esc(r.boutiqueCategory||'--'))+'</div></div>'+
    '<div class="ic"><div class="il">UID</div><div class="iv" style="font-size:.58rem">'+esc(r.uid||r.id||'--')+'</div></div>'+
    '</div><div class="cdesc">'+esc(r.boutiqueDesc||'--')+'</div>'+
    '<div class="cinrow"><div><div class="cinlbl">CIN Recto</div>'+cR+'</div><div><div class="cinlbl">CIN Verso</div>'+cV+'</div></div>'+
    acts+'</div>';
}
async function loadBoutiques(){
  if(boutLoaded)return;
  document.getElementById('bout-list').innerHTML='<div class="empty"><div class="empty-ic">⏳</div>Chargement...</div>';
  try{
    var snap=await db.collection('boutiques').get();
    allBout=[];snap.forEach(function(d){allBout.push(Object.assign({id:d.id},d.data()));});
    boutLoaded=true;
    document.getElementById('sb0').textContent=allBout.filter(function(b){return b.status==='active';}).length;
    document.getElementById('sb1').textContent=allBout.filter(function(b){return b.status==='blocked';}).length;
    document.getElementById('sb2').textContent=allBout.length;
    renderBoutiques(allBout);
  }catch(e){document.getElementById('bout-list').innerHTML='<div class="empty">Erreur: '+esc(e.message)+'</div>';}
}
function renderBoutiques(list){
  var el=document.getElementById('bout-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ic">Aucune boutique</div></div>';return;}
  el.innerHTML=list.map(function(b){
    var av=b.profilPhoto?'<img src="'+esc(b.profilPhoto)+'" style="width:100%;height:100%;object-fit:cover">':'?';
    var isB=b.status==='blocked';
    return '<div class="ucard" style="border-left:4px solid '+(isB?'var(--oo)':'var(--gg)')+'">'+
      '<div class="uav" style="font-size:1.3rem">'+av+'</div>'+
      '<div class="uinfo"><div class="uname">'+esc(b.boutiqueName||'--')+'</div>'+
      '<div class="uemail">'+esc(b.ownerName||'')+(b.ownerEmail?' -- '+esc(b.ownerEmail):'')+'</div>'+
      '<div class="udate">'+esc(cats[b.boutiqueCategory]||b.boutiqueCategory||'')+'</div></div>'+
      '<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">'+
      '<span class="ubadge '+(isB?'no':'has')+'">'+(isB?'Bloquee':'Active')+'</span>'+
      (isB?'<button class="btn-a b-ub" style="font-size:.65rem;padding:5px 8px;min-width:0" data-id="'+b.id+'" data-act="unblockBout">Debloquer</button>':
           '<button class="btn-a b-bl" style="font-size:.65rem;padding:5px 8px;min-width:0" data-id="'+b.id+'" data-act="blockBout">Bloquer</button>')+
      '<button class="btn-a b-del" style="font-size:.65rem;padding:5px 8px;min-width:0" data-id="'+b.id+'" data-act="deleteBout">X</button>'+
      '</div></div>';
  }).join('');
}
async function loadUsers(){
  if(usersLoaded)return;
  document.getElementById('users-list').innerHTML='<div class="empty"><div class="empty-ic">⏳</div>Chargement...</div>';
  try{
    var snap=await db.collection('users').orderBy('createdAt','desc').get();
    allUsers=[];snap.forEach(function(d){allUsers.push(Object.assign({id:d.id},d.data()));});
    usersLoaded=true;
    document.getElementById('sc0').textContent=allUsers.length;
    db.collection('boutiques').where('status','==','active').get().then(function(bs){document.getElementById('sc1').textContent=bs.size;});
    renderUsers(allUsers);
  }catch(e){document.getElementById('users-list').innerHTML='<div class="empty">Erreur: '+esc(e.message)+'</div>';}
}
function renderUsers(list){
  var el=document.getElementById('users-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ic">📭</div>Aucun compte</div>';return;}
  el.innerHTML=list.map(function(u){
    var ini=(u.name||u.email||'?')[0].toUpperCase();
    var av=u.profilPhoto?'<img src="'+esc(u.profilPhoto)+'" style="width:100%;height:100%;object-fit:cover" >' :ini;
    var dt=u.createdAt?new Date(u.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'—';
    var hb=all.some(function(r){return r.uid===u.uid&&(r.status==='approved'||r.status==='blocked');});
    return '<div class="ucard">'+
      '<div class="uav">'+av+'</div>'+
      '<div class="uinfo"><div class="uname">'+esc(u.name||'—')+'</div>'+
      '<div class="uemail">'+esc(u.email||'—')+'</div>'+
      '<div class="udate">Inscrit le '+dt+'</div></div>'+
      '<span class="ubadge '+(hb?'has':'no')+'">'+(hb?'🏪 Boutique':'Sans boutique')+'</span>'+
    '</div>';
  }).join('');
}
function switchSec(sec,btn){
  curSec=sec;
  document.querySelectorAll('.stab').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');
  ['demandes','boutiques','comptes'].forEach(function(s){document.getElementById('sec-'+s).style.display=s===sec?'block':'none';});
  document.getElementById('srch').value='';
  var ph={demandes:'Rechercher demande, nom, email...',boutiques:'Rechercher boutique...',comptes:'Rechercher compte, nom, email...'};
  document.getElementById('srch').placeholder=ph[sec]||'Rechercher...';
  if(sec==='boutiques'&&!boutLoaded)loadBoutiques();
  if(sec==='comptes'&&!usersLoaded)loadUsers();
}
function handleSearch(v){
  v=v.toLowerCase().trim();
  if(curSec==='demandes'){
    if(!v){renderList();return;}
    var f=all.filter(function(r){return(r.boutiqueName||'').toLowerCase().includes(v)||(r.userName||'').toLowerCase().includes(v)||(r.userEmail||'').toLowerCase().includes(v);});
    document.getElementById('req-list').innerHTML=f.length?f.map(cardHtml).join(''):'<div class="empty"><div class="empty-ic">🔍</div>Aucun résultat</div>';
  }else if(curSec==='boutiques'){
    if(!v){renderBoutiques(allBout);return;}
    renderBoutiques(allBout.filter(function(b){return(b.boutiqueName||'').toLowerCase().includes(v)||(b.ownerName||'').toLowerCase().includes(v)||(b.ownerEmail||'').toLowerCase().includes(v);}));
  }else{
    if(!v){renderUsers(allUsers);return;}
    renderUsers(allUsers.filter(function(u){return(u.name||'').toLowerCase().includes(v)||(u.email||'').toLowerCase().includes(v);}));
  }
}
async function approveReq(id,uid,btn){
  if(!confirm('Valider cette boutique ?'))return;
  btn.disabled=true;btn.textContent='⏳';
  var r=all.find(function(x){return x.id===id;});if(!r)return;
  try{
    var b=db.batch();
    b.update(db.collection('boutique_requests').doc(id),{status:'approved',approvedAt:new Date().toISOString()});
    b.set(db.collection('boutiques').doc(uid),{uid:uid,boutiqueName:r.boutiqueName,boutiqueDesc:r.boutiqueDesc,boutiqueCategory:r.boutiqueCategory,ownerName:r.userName,ownerEmail:r.userEmail,status:'active',createdAt:new Date().toISOString()});
    await b.commit();
    var i=all.findIndex(function(x){return x.id===id;});if(i>=0){all[i].status='approved';all[i].approvedAt=new Date().toISOString();}
    boutLoaded=false;updateStats();renderList();
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='✅ Valider';}
}
async function rejectReq(id,btn){
  var note=prompt('Raison du rejet:');if(note===null)return;
  btn.disabled=true;btn.textContent='⏳';
  try{
    await db.collection('boutique_requests').doc(id).update({status:'rejected',adminNote:note||'',rejectedAt:new Date().toISOString()});
    var i=all.findIndex(function(x){return x.id===id;});if(i>=0){all[i].status='rejected';all[i].adminNote=note||'';}
    updateStats();renderList();
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='❌ Rejeter';}
}
async function blockReq(id,uid,btn){
  var note=prompt('Raison du blocage:');if(note===null)return;
  btn.disabled=true;btn.textContent='⏳';
  try{
    var b=db.batch();
    b.update(db.collection('boutique_requests').doc(id),{status:'blocked',adminNote:note||'',blockedAt:new Date().toISOString()});
    b.update(db.collection('boutiques').doc(uid),{status:'blocked'}).catch(function(){});
    await b.commit();
    var i=all.findIndex(function(x){return x.id===id;});if(i>=0){all[i].status='blocked';all[i].adminNote=note||'';}
    boutLoaded=false;updateStats();renderList();
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='🚫 Bloquer';}
}
async function unblockReq(id,uid,btn){
  if(!confirm('Débloquer ?'))return;btn.disabled=true;btn.textContent='⏳';
  try{
    var b=db.batch();
    b.update(db.collection('boutique_requests').doc(id),{status:'approved',adminNote:'',unblockedAt:new Date().toISOString()});
    b.update(db.collection('boutiques').doc(uid),{status:'active'}).catch(function(){});
    await b.commit();
    var i=all.findIndex(function(x){return x.id===id;});if(i>=0){all[i].status='approved';all[i].adminNote='';}
    boutLoaded=false;updateStats();renderList();
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='✅ Débloquer';}
}
async function deleteReq(id,uid,btn){
  if(!confirm('⚠️ Supprimer définitivement ?'))return;btn.disabled=true;btn.textContent='⏳';
  try{
    var b=db.batch();
    b.delete(db.collection('boutique_requests').doc(id));
    b.delete(db.collection('boutiques').doc(uid));
    await b.commit();
    all=all.filter(function(x){return x.id!==id;});
    boutLoaded=false;updateStats();renderList();
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='🗑️ Supprimer';}
}
async function blockBout(id,btn){
  var note=prompt('Raison du blocage:');if(note===null)return;
  btn.disabled=true;btn.textContent='⏳';
  try{
    await db.collection('boutiques').doc(id).update({status:'blocked',blockedAt:new Date().toISOString(),blockNote:note||''});
    db.collection('boutique_requests').doc(id).update({status:'blocked',adminNote:note||''}).catch(function(){});
    var i=allBout.findIndex(function(x){return x.id===id;});if(i>=0)allBout[i].status='blocked';
    document.getElementById('sb0').textContent=allBout.filter(function(b){return b.status==='active';}).length;
    document.getElementById('sb1').textContent=allBout.filter(function(b){return b.status==='blocked';}).length;
    renderBoutiques(allBout);
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='Bloquer';}
}
async function unblockBout(id,btn){
  if(!confirm('Débloquer ?'))return;btn.disabled=true;btn.textContent='⏳';
  try{
    await db.collection('boutiques').doc(id).update({status:'active',unblockedAt:new Date().toISOString()});
    db.collection('boutique_requests').doc(id).update({status:'approved',adminNote:''}).catch(function(){});
    var i=allBout.findIndex(function(x){return x.id===id;});if(i>=0)allBout[i].status='active';
    document.getElementById('sb0').textContent=allBout.filter(function(b){return b.status==='active';}).length;
    document.getElementById('sb1').textContent=allBout.filter(function(b){return b.status==='blocked';}).length;
    renderBoutiques(allBout);
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='Débloquer';}
}
async function deleteBout(id,btn){
  if(!confirm('⚠️ Supprimer définitivement la boutique ?'))return;btn.disabled=true;btn.textContent='⏳';
  try{
    var b=db.batch();
    b.delete(db.collection('boutiques').doc(id));
    b.delete(db.collection('boutique_requests').doc(id));
    await b.commit();
    allBout=allBout.filter(function(x){return x.id!==id;});
    document.getElementById('sb0').textContent=allBout.filter(function(b){return b.status==='active';}).length;
    document.getElementById('sb1').textContent=allBout.filter(function(b){return b.status==='blocked';}).length;
    document.getElementById('sb2').textContent=allBout.length;
    renderBoutiques(allBout);
  }catch(e){alert('Erreur: '+e.message);btn.disabled=false;btn.textContent='🗑️';}
}
function openLb(url){document.getElementById('lb-img').src=url;document.getElementById('lb').classList.add('open');}
document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-act]');
  if(!btn)return;
  var act=btn.dataset.act;
  var id=btn.dataset.id||'';
  var uid=btn.dataset.uid||id;
  if(act==='approve')approveReq(id,uid,btn);
  else if(act==='reject')rejectReq(id,btn);
  else if(act==='block')blockReq(id,uid,btn);
  else if(act==='unblock')unblockReq(id,uid,btn);
  else if(act==='delete')deleteReq(id,uid,btn);
  else if(act==='blockBout')blockBout(id,btn);
  else if(act==='unblockBout')unblockBout(id,btn);
  else if(act==='deleteBout')deleteBout(id,btn);
});
</script></body></html>
